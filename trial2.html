<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  >

  <title>Geo Message Drop</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      background:#111;
      color:white;

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100vh;

      padding:20px;
    }

    .box{
      width:100%;
      max-width:500px;

      background:#1b1b1b;

      padding:24px;

      border-radius:24px;

      box-shadow:
      0 10px 40px rgba(0,0,0,0.45);
    }

    h2{
      font-size:28px;
      margin-bottom:18px;
      font-weight:700;
    }

    textarea{
      width:100%;
      min-height:220px;

      border:none;
      outline:none;
      resize:none;

      border-radius:18px;

      padding:18px;

      background:#2a2a2a;

      color:white;

      font-size:18px;
      line-height:1.5;

      margin-bottom:18px;
    }

    textarea::placeholder{
      color:#888;
    }

    button{
      width:100%;

      padding:18px;

      border:none;
      border-radius:18px;

      background:white;
      color:black;

      font-size:18px;
      font-weight:700;

      cursor:pointer;

      transition:0.2s ease;
    }

    button:active{
      transform:scale(0.98);
    }

    .status{
      margin-top:16px;
      text-align:center;
      color:#999;
      font-size:14px;
    }

    /* MOBILE */

    @media(max-width:480px){

      body{
        padding:14px;
        align-items:flex-start;
        padding-top:40px;
      }

      .box{
        padding:18px;
        border-radius:20px;
      }

      h2{
        font-size:24px;
      }

      textarea{
        min-height:190px;
        font-size:16px;
        padding:16px;
      }

      button{
        padding:16px;
        font-size:16px;
      }

    }

  </style>
</head>
<body>

<div class="box">

  <h2>Leave A Message</h2>

  <textarea
    id="message"
    placeholder="Write something..."
  ></textarea>

  <button onclick="sendMessage()">
    Send
  </button>

  <div class="status" id="status">
    Getting your location...
  </div>

</div>

<script>

let locationData = null;

/* AUTO LOCATION */

navigator.geolocation.getCurrentPosition(
  (position)=>{

    locationData = {
      latitude: position.coords.latitude,
      longitude: position.coords.longitude
    };

    document.getElementById("status").innerText =
      "Location attached.";

  },
  ()=>{

    document.getElementById("status").innerText =
      "Location permission denied.";

  }
);

/* SEND */

async function sendMessage(){

  const message =
    document.getElementById("message").value;

  if(!message){
    alert("Write something first.");
    return;
  }

  const payload = {
    message,
    latitude: locationData?.latitude || null,
    longitude: locationData?.longitude || null,
    time: new Date().toLocaleString()
  };

  /*
    PASTE YOUR GOOGLE APPS SCRIPT URL HERE
  */

  const SCRIPT_URL =
    "https://script.google.com/macros/s/AKfycbwvn8ulwRX68p3HueBplNU09PhlMbqPOA7YGQGb_S-bBNheSe27RB40L4AX6f_Glitc/exec";

  try{

    await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify(payload)
    });

    alert("Message saved.");

    document.getElementById("message").value = "";

  }catch(err){

    alert("Failed to save.");

    console.error(err);

  }

}

</script>

</body>
</html>
